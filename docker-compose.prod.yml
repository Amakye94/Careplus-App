name: CI/CD Pipeline for CarePlus

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend
        run: docker build -t amakye94/careplus-backend:latest ./backend

      - name: Build frontend
        run: docker build -t amakye94/careplus-frontend:latest ./frontend

      - name: Push backend image
        run: docker push amakye94/careplus-backend:latest

      - name: Push frontend image
        run: docker push amakye94/careplus-frontend:latest

      - name: Deploy to production server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull amakye94/careplus-backend:latest
            docker pull amakye94/careplus-frontend:latest
            cd /home/ubuntu/careplus  # Replace with actual project folder on your server
            docker-compose -f docker-compose.prod.yml up -d --remove-orphans


