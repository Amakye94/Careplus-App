services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: careplus-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./frontend/careplus.db:/app/backend/careplus.db  # persist DB outside container
    command: >
      sh -c "python -m backend.seed && uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    networks:
      - careplus-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: careplus-frontend
    ports:
      - "70:80"
    depends_on:
      - backend
    networks:
      - careplus-net

networks:
  careplus-net:
    driver: bridge
